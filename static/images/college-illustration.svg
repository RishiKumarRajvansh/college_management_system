<!-- College Illustration SVG -->
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="800" height="600" fill="#ffffff"/>
    
    <!-- College Building -->
    <rect x="250" y="150" width="300" height="250" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
    
    <!-- Roof -->
    <polygon points="250,150 400,50 550,150" fill="#e57373" stroke="#333" stroke-width="2"/>
    
    <!-- Entrance -->
    <rect x="350" y="300" width="100" height="100" fill="#90a4ae" stroke="#333" stroke-width="2"/>
    <rect x="385" y="320" width="30" height="80" fill="#ffffff" stroke="#333" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="280" y="180" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    <rect x="350" y="180" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    <rect x="420" y="180" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    <rect x="480" y="180" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    
    <rect x="280" y="240" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    <rect x="480" y="240" width="40" height="40" fill="#bbdefb" stroke="#333" stroke-width="2"/>
    
    <!-- Steps -->
    <rect x="350" y="400" width="100" height="10" fill="#9e9e9e" stroke="#333" stroke-width="1"/>
    <rect x="360" y="410" width="80" height="10" fill="#9e9e9e" stroke="#333" stroke-width="1"/>
    <rect x="370" y="420" width="60" height="10" fill="#9e9e9e" stroke="#333" stroke-width="1"/>
    
    <!-- Columns -->
    <rect x="350" y="300" width="10" height="100" fill="#d7ccc8" stroke="#333" stroke-width="1"/>
    <rect x="440" y="300" width="10" height="100" fill="#d7ccc8" stroke="#333" stroke-width="1"/>
    
    <!-- Trees -->
    <circle cx="150" cy="350" r="50" fill="#a5d6a7" stroke="#333" stroke-width="1"/>
    <rect x="145" y="400" width="10" height="50" fill="#795548" stroke="#333" stroke-width="1"/>
    
    <circle cx="650" cy="350" r="50" fill="#a5d6a7" stroke="#333" stroke-width="1"/>
    <rect x="645" y="400" width="10" height="50" fill="#795548" stroke="#333" stroke-width="1"/>
    
    <!-- School Name -->
    <text x="400" y="500" font-family="Arial" font-size="24" fill="#333" text-anchor="middle">College Management System</text>
    <text x="400" y="530" font-family="Arial" font-size="18" fill="#666" text-anchor="middle">Education Made Simple</text>
</svg>
