<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- College Building with Students -->
  <rect x="200" y="150" width="400" height="300" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="200,150 400,50 600,150" fill="#8B4513" stroke="#333" stroke-width="2"/>
  <!-- Entrance -->
  <rect x="350" y="350" width="100" height="100" fill="#5F9EA0" stroke="#333" stroke-width="2"/>
  <!-- Steps -->
  <rect x="330" y="450" width="140" height="10" fill="#777" stroke="#333"/>
  <rect x="340" y="460" width="120" height="10" fill="#777" stroke="#333"/>
  <rect x="350" y="470" width="100" height="10" fill="#777" stroke="#333"/>
  <!-- Windows -->
  <rect x="250" y="200" width="60" height="80" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <rect x="490" y="200" width="60" height="80" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <rect x="250" y="320" width="60" height="80" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <rect x="490" y="320" width="60" height="80" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <!-- Students (simplified) -->
  <circle cx="150" y="480" r="20" fill="#FFD700" stroke="#333" stroke-width="1"/>
  <rect x="145" y="500" width="10" height="50" fill="#1E90FF" stroke="#333" stroke-width="1"/>
  
  <circle cx="650" y="480" r="20" fill="#FF6347" stroke="#333" stroke-width="1"/>
  <rect x="645" y="500" width="10" height="50" fill="#32CD32" stroke="#333" stroke-width="1"/>
  
  <!-- College Name -->
  <text x="400" y="120" font-family="Arial" font-size="24" text-anchor="middle" fill="#333" font-weight="bold">College Management System</text>
  
  <!-- Pillar left -->
  <rect x="220" y="150" width="20" height="300" fill="#D3D3D3" stroke="#333"/>
  <!-- Pillar right -->
  <rect x="560" y="150" width="20" height="300" fill="#D3D3D3" stroke="#333"/>
</svg>
