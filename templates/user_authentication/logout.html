{% extends 'base_minimal.html' %}
{% load static %}

{% block title %}Logged Out - College Management System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-4 text-center">
                    <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
                    <h2 class="card-title">Successfully Logged Out</h2>
                    <p class="card-text">Thank you for using the College Management System.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary mt-3">
                        <i class="fas fa-sign-in-alt me-1"></i> Log in again
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-secondary mt-3">
                        <i class="fas fa-home me-1"></i> Return to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
