{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - College Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Reset Complete</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="fas fa-lock-open fa-4x text-success mb-4"></i>
                <h5 class="mb-4">Your password has been set.</h5>
                <p>You can now use your new password to log in.</p>
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
